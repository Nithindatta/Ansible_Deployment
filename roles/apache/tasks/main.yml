---
# tasks file for roles/apache

- name: Install Apache
  ansible.builtin.apt:
    name: apache2
    state: present
    update_cache: yes

- name: Start the service
  ansible.builtin.apt:
    name: apache2
    state: started
    enabled: yes

- name: Create Service Account
  ansible.builtin.user:
    name: webadmin
    password: "{{webadmin_password}}"
    group: sudo
    append: yes
    state: present
